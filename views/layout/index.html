<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Buykart</title>
    <link rel="shortcut icon" href="/public/img/logo(1).png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/public/Css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation Component Placeholder -->
    <div id="nav-placeholder"></div>

    <main id="main-dashboard" class="p-4 sm:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Dashboard</h1>

            <!-- Stat Cards -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                <!-- Total Products Card -->
                <div class="bg-white rounded-lg shadow-md p-6 flex items-center justify-between hover:shadow-lg transition-shadow">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Products</p>
                        <p id="product-count" class="text-3xl font-bold text-gray-800">...</p>
                        <p class="text-xs text-gray-400 mt-1">Value: <strong id="total-value" class="text-gray-600">...</strong></p>
                    </div>
                    <div class="bg-primary-lightest text-primary rounded-full p-3">
                        <span class="material-icons">inventory_2</span>
                    </div>
                </div>
                <!-- Total Orders Card -->
                <div class="bg-white rounded-lg shadow-md p-6 flex items-center justify-between hover:shadow-lg transition-shadow">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Orders</p>
                        <p id="order-count" class="text-3xl font-bold text-gray-800">...</p>
                    </div>
                    <div class="bg-green-100 text-green-600 rounded-full p-3">
                        <span class="material-icons">shopping_cart</span>
                    </div>
                </div>
                <!-- Total Users Card -->
                <div class="bg-white rounded-lg shadow-md p-6 flex items-center justify-between hover:shadow-lg transition-shadow">
                    <div>
                        <p class="text-sm font-medium text-gray-500">Total Users</p>
                        <p id="user-count" class="text-3xl font-bold text-gray-800">...</p>
                    </div>
                    <div class="bg-blue-100 text-blue-600 rounded-full p-3">
                        <span class="material-icons">group</span>
                    </div>
                </div>
            </div>

            <!-- Main Content Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <!-- Sales Chart -->
                <div class="lg:col-span-2 bg-white p-4 sm:p-6 rounded-lg shadow-md">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Sales Overview (Last 7 Days)</h3>
                    <div class="h-64 md:h-80">
                        <canvas id="salesChart"></canvas>
                    </div>
                </div>

                <!-- Recent Activity -->
                <div class="bg-white p-4 sm:p-6 rounded-lg shadow-md">
                    <h3 class="text-lg font-semibold text-gray-800 mb-4">Recent Activity</h3>
                    <div id="recent-activity-list" class="space-y-4 max-h-[350px] overflow-y-auto pr-2">
                        <p class="text-gray-500 italic">Loading recent activity...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/public/Js/style.js"></script>
</body>
</html>

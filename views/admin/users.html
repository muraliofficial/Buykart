<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Buykart Admin</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/public/Css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>
<body class="bg-gray-50">
    <div id="nav-placeholder"></div>

    <main class="p-4 sm:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Registered Users</h1>
                
                <!-- Button to jump to the Add User page if ever needed -->
                <a href="/user" class="bg-primary text-white px-4 py-2 rounded-lg hover:opacity-90 transition shadow-sm flex items-center gap-2">
                    <span class="material-icons text-sm">person_add</span> Add User
                </a>
            </div>

            <!-- Users Table -->
            <div class="bg-white rounded-lg shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm text-left text-gray-600">
                        <thead class="text-xs text-gray-700 uppercase bg-gray-100">
                            <tr>
                                <th scope="col" class="p-3">Name</th>
                                <th scope="col" class="p-3">Phone</th>
                                <th scope="col" class="p-3">Registered Date</th>
                                <th scope="col" class="p-3">User ID</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- JS will populate this -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="/public/Js/style.js"></script>
</body>
</html>

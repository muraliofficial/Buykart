<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="shortcut icon" href="public/img/logo(1).png" type="image/x-icon">
    <script src="/public/Js/style.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="/public/Css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Navigation Component Placeholder -->
    <div id="nav-placeholder"></div>

    <!-- Admin Content / Components -->
    <div id="main-dashboard" class="max-w-6xl mx-auto px-4 pb-12">        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Component 1: Users -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-md transition">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-xl font-semibold text-gray-800">Users</h3>
                    <span id="user-count" class="text-3xl font-bold text-primary">...</span>
                </div>
                <p class="text-gray-600 mb-4">Manage customer accounts and permissions.</p>
                <a href="/users" class="text-primary hover:underline inline-block">View Users &rarr;</a>
            </div>

            <!-- Component 2: Products -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-md transition">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-xl font-semibold text-gray-800">Products</h3>
                    <span id="product-count" class="text-3xl font-bold text-primary">...</span>
                </div>
                <p class="text-gray-600 mb-4">Update inventory, prices, and descriptions. <br><span class="text-sm mt-1 inline-block">Total Value: <strong id="total-value" class="text-gray-800">...</strong></span></p>
                <a href="/inventory" class="text-primary hover:underline inline-block">Manage Inventory &rarr;</a>
            </div>

            <!-- Component 3: Orders -->
            <div class="bg-white p-6 rounded-lg shadow hover:shadow-md transition">
                <div class="flex justify-between items-start mb-2">
                    <h3 class="text-xl font-semibold text-gray-800">Orders</h3>
                    <span id="order-count" class="text-3xl font-bold text-primary">...</span>
                </div>
                <p class="text-gray-600 mb-4">Track shipments and process new orders.</p>
                <a href="/orders" class="text-primary hover:underline inline-block">View Orders &rarr;</a>
            </div>
        </div>

        <!-- Additional Section -->
        <div class="mt-8 bg-white p-6 rounded-lg shadow">
            <h3 class="text-xl font-semibold mb-4 text-gray-800">Recent Activity</h3>
            <div id="recent-activity-list" class="border-t border-gray-100 pt-4 space-y-4 max-h-[350px] overflow-y-auto pr-2">
                <p class="text-gray-500 italic">Loading recent activity...</p>
            </div>
        </div>
    </div>
</body>
</html>
